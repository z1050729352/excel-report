<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>极简摘要</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: #fff; color: #1a1a2e; font-size: 14px; line-height: 1.8;
    }
    .page {
      width: 210mm; min-height: 297mm;
      padding: 20mm 18mm; page-break-after: always;
    }
    .page:last-child { page-break-after: auto; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .page { page-break-after: always; }
    }

    /* 极简封面 */
    .cover-minimal {
      display: flex; flex-direction: column; justify-content: center;
      min-height: 260mm; padding: 60px 40px;
    }
    .cover-minimal-title {
      font-size: 48px; font-weight: 900; color: #1d2b64;
      letter-spacing: 2px; margin-bottom: 16px;
    }
    .cover-minimal-line {
      width: 60px; height: 4px; background: #4facfe;
      border-radius: 2px; margin-bottom: 32px;
    }
    .cover-minimal-file {
      font-size: 18px; color: #333; margin-bottom: 8px;
    }
    .cover-minimal-meta {
      font-size: 14px; color: #999; line-height: 2;
    }

    /* 内容页 */
    .content-header {
      margin-bottom: 40px;
    }
    .content-title {
      font-size: 20px; font-weight: 800; color: #1d2b64;
      margin-bottom: 6px;
    }
    .content-subtitle {
      font-size: 12px; color: #999;
    }

    /* 关键数字 */
    .key-numbers {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-bottom: 48px; padding-bottom: 40px;
      border-bottom: 1px solid #eee;
    }
    .key-num-item { text-align: center; }
    .key-num-value {
      font-size: 36px; font-weight: 900; color: #1d2b64;
      margin-bottom: 4px;
    }
    .key-num-value.accent { color: #4facfe; }
    .key-num-label {
      font-size: 12px; color: #999; letter-spacing: 1px;
    }

    /* 洞察列表 */
    .insights-section {
      margin-top: 8px;
    }
    .insights-title {
      font-size: 15px; font-weight: 700; color: #1d2b64;
      margin-bottom: 20px;
    }
    .insight-list {
      list-style: none; padding: 0;
    }
    .insight-list li {
      position: relative; padding: 12px 0 12px 20px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px; color: #333; line-height: 1.7;
    }
    .insight-list li:last-child { border-bottom: none; }
    .insight-list li::before {
      content: '';
      position: absolute; left: 0; top: 18px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #4facfe;
    }
    .insight-list li.warning::before { background: #fb8c00; }
    .insight-list li.positive::before { background: #43a047; }
    .insight-list li.negative::before { background: #e53935; }

    /* 页脚 */
    .page-footer {
      position: relative; margin-top: auto; padding-top: 16px;
      display: flex; justify-content: space-between;
      font-size: 10px; color: #ccc;
    }
  </style>
</head>
<body>
<div id="report-app"></div>
<script>
window.addEventListener('DOMContentLoaded', function() {
  const D = window.__REPORT_DATA__;
  if (!D) { document.body.innerHTML = '<p style="color:red;padding:40px">数据未注入</p>'; return; }

  const fmt = (n) => n == null ? '—' : Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 2 });

  const summary = D.summary || {};
  const primaryCol = summary.primaryValueColumn || '';
  const stats = primaryCol && summary.columnStats ? summary.columnStats[primaryCol] : null;
  const quality = D.dataQuality || {};
  const insights = D.insights || [];
  const monthly = D.monthlyGrowth || [];

  const app = document.getElementById('report-app');

  // ─── 页 1：极简封面 ─────────────────────────────────────────────────────────
  app.innerHTML += `
  <div class="page">
    <div class="cover-minimal">
      <div class="cover-minimal-title">数据摘要</div>
      <div class="cover-minimal-line"></div>
      <div class="cover-minimal-file">${D.fileName || '数据文件'}</div>
      <div class="cover-minimal-meta">
        ${D.generatedAt || ''}<br/>
        ${fmt(summary.totalRows)} 行 · ${(D.headers || []).length} 列${primaryCol ? ' · ' + primaryCol : ''}
      </div>
    </div>
  </div>`;

  // ─── 页 2：关键数字 + 洞察 ─────────────────────────────────────────────────
  // 计算最新增长
  const lastMom = monthly.length > 1 && monthly[monthly.length - 1].mom != null
    ? monthly[monthly.length - 1].mom : null;
  const momText = lastMom != null ? (lastMom > 0 ? '+' : '') + Number(lastMom).toFixed(1) + '%' : '—';

  let page2 = `
  <div class="page">
    <div class="content-header">
      <div class="content-title">关键指标</div>
      <div class="content-subtitle">${D.fileName || ''} · ${D.generatedAt || ''}</div>
    </div>

    <div class="key-numbers">
      <div class="key-num-item">
        <div class="key-num-value">${fmt(summary.totalRows)}</div>
        <div class="key-num-label">数据总量</div>
      </div>
      <div class="key-num-item">
        <div class="key-num-value accent">${stats ? fmt(stats.sum) : '—'}</div>
        <div class="key-num-label">${primaryCol || '主指标'} 总计</div>
      </div>
      <div class="key-num-item">
        <div class="key-num-value">${quality.score || '—'}<span style="font-size:18px;color:#999">分</span></div>
        <div class="key-num-label">数据质量</div>
      </div>
    </div>

    <div class="key-numbers" style="border-bottom:none;margin-bottom:32px;padding-bottom:0;">
      <div class="key-num-item">
        <div class="key-num-value">${stats ? fmt(stats.avg) : '—'}</div>
        <div class="key-num-label">均值</div>
      </div>
      <div class="key-num-item">
        <div class="key-num-value">${stats ? fmt(stats.max) : '—'}</div>
        <div class="key-num-label">最大值</div>
      </div>
      <div class="key-num-item">
        <div class="key-num-value">${momText}</div>
        <div class="key-num-label">最新环比增长</div>
      </div>
    </div>`;

  // 洞察列表
  if (insights.length > 0) {
    page2 += `
    <div class="insights-section">
      <div class="insights-title">分析洞察</div>
      <ul class="insight-list">`;

    insights.forEach(i => {
      let cls = '';
      if (i.type === 'warning' || i.type === 'anomaly') cls = 'warning';
      else if (i.type === 'positive' || i.type === 'trend') cls = 'positive';
      else if (i.type === 'negative') cls = 'negative';
      page2 += `<li class="${cls}">${i.text}</li>`;
    });

    page2 += `
      </ul>
    </div>`;
  }

  page2 += `
    <div class="page-footer">
      <span>${D.fileName || ''}</span>
      <span>${D.generatedAt || ''}</span>
    </div>
  </div>`;
  app.innerHTML += page2;

  // 极简模板不使用图表，但保留 setTimeout 以符合规范
  setTimeout(function() {
    // 无图表需要初始化
  }, 600);
});
</script>
</body>
</html>
